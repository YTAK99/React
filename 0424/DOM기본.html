<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <script>
            function onClickButton() {
                const h1Elm = document.getElementById("h1");
                // getElementById : 돔에서 인수로 전달한 태그의 id 요소를 찾아 반환
                h1Elm.innerText = "반가워요!";
            }
        </script>
    </head>
    <body>
        <h1 id="h1">안녕하세요</h1>
        <button onclick="onClickButton()">인사말 바꾸기</button>
    </body>
</html>
